version: "3.8"

services:
    db:
        image: postgres:15-alpine
        container_name: hitster_db
        environment:
            POSTGRES_USER: hitster
            POSTGRES_PASSWORD: hitster_password
            POSTGRES_DB: hitster_db
        volumes:
            - db_data:/var/lib/postgresql/data
        networks:
            - app-network

    backend:
        build:
            context: ./spotify
            dockerfile: Dockerfile
        container_name: hitster_backend
        ports:
            - "4002:4002"
        env_file:
            - ./spotify/.env
        depends_on:
            - db
        restart: unless-stopped
        networks:
            - app-network

networks:
    app-network:
        driver: bridge

volumes:
    db_data:
