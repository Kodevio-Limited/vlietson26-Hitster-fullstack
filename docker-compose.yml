version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hitster_db
    environment:
      POSTGRES_USER: hitster
      POSTGRES_PASSWORD: hitster_password
      POSTGRES_DB: hitster_db
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    image: node:22-alpine
    container_name: hitster_backend
    working_dir: /app
    volumes:
      - ./spotify:/app
      - /app/node_modules
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "4021:4021"
    environment:
      - NODE_ENV=development
      - PORT=4021
      - API_URL=http://localhost:4021
      - FRONTEND_URL=http://localhost:3001
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=hitster
      - DB_PASSWORD=hitster_password
      - DB_DATABASE=hitster_db
      - DB_SSL=false
      # Make sure your other required secrets are copied below or pass env_file
    env_file:
      - ./spotify/.env
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    image: node:20-alpine
    container_name: hitster_frontend
    working_dir: /app
    volumes:
      - ./frontend-dashboard:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:4021/api
    env_file:
      - ./frontend-dashboard/.env.local
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
